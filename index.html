  <!-- Tailwind CSS -->

  <!-- React & ReactDOM -->

  <!-- Tailwind Config -->
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            brand: {
              dark: '#0F172A',
              primary: '#6C63FF',
              accent: '#FF6B6B',
              glass: 'rgba(255, 255, 255, 0.05)',
            }
          },
          fontFamily: {
            sans: ['Inter', 'sans-serif'],
          },
          animation: {
            blob: "blob 7s infinite",
            'slide-in-right': 'slideInRight 0.3s ease-out',
            'bounce-in': 'bounceIn 0.5s ease-out',
            'float': 'float 6s ease-in-out infinite',
          },
          keyframes: {
            blob: {
              "0%": { transform: "translate(0px, 0px) scale(1)" },
              "33%": { transform: "translate(30px, -50px) scale(1.1)" },
              "66%": { transform: "translate(-20px, 20px) scale(0.9)" },
              "100%": { transform: "translate(0px, 0px) scale(1)" },
            },
            slideInRight: {
              "0%": { transform: "translateX(100%)" },
              "100%": { transform: "translateX(0)" },
            },
            bounceIn: {
              "0%": { transform: "translateY(100%)", opacity: 0 },
              "70%": { transform: "translateY(-10px)", opacity: 1 },
              "100%": { transform: "translateY(0)", opacity: 1 },
            },
            float: {
              "0%, 100%": { transform: "translateY(0px)" },
              "50%": { transform: "translateY(-20px)" },
            },
          },
        },
      },
    }
  </script>

      border: 1px solid rgba(255, 255, 255, 0.1);

    .text-gradient {

      -webkit-text-fill-color: transparent;

    /* Line Clamp */

      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    /* Marble Texture Overlay */
    .marble-overlay {
      position: relative;
    }

      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(180deg, rgba(15,23,42,0.8) 0%, rgba(15,23,42,0.4) 50%, rgba(15,23,42,0.9) 100%);
      z-index: 1;
    }
    .marble-overlay > * {
      position: relative;
      z-index: 2;
    }
  </style>
</head>

    // ==================== CONTEXT ====================
    const ShopContext = createContext();

    const ShopProvider = ({ children }) => {
      const [cart, setCart] = useState([]);
      const [wishlist, setWishlist] = useState([]);
      const [isCartOpen, setIsCartOpen] = useState(false);
      const [toast, setToast] = useState(null);

      useEffect(() => {
        const savedCart = localStorage.getItem('colorSphereCart');
        if (savedCart) setCart(JSON.parse(savedCart));
      }, []);

      useEffect(() => {
        localStorage.setItem('colorSphereCart', JSON.stringify(cart));
      }, [cart]);

      const addToCart = (product, qty = 1) => {
        setCart(prev => {
          const existing = prev.find(item => item.id === product.id);
          if (existing) {
            return prev.map(item => 
              item.id === product.id ? { ...item, qty: item.qty + qty } : item
            );
          }
          return [...prev, { ...product, qty }];
        });
        showToast(`Added ${product.name} to cart!`, 'success');
        setIsCartOpen(true);
      };

      const removeFromCart = (id) => {
        setCart(prev => prev.filter(item => item.id !== id));
      };

      const updateQty = (id, delta) => {
        setCart(prev => prev.map(item => {
          if (item.id === id) {
            const newQty = Math.max(1, item.qty + delta);
            return { ...item, qty: newQty };
          }
          return item;
        }));
      };

      const toggleWishlist = (id) => {
        setWishlist(prev => 
          prev.includes(id) ? prev.filter(i => i !== id) : [...prev, id]
        );
      };

      const showToast = (message, type = 'info') => {
        setToast({ message, type });
        setTimeout(() => setToast(null), 3000);
      };

      const cartTotal = cart.reduce((acc, item) => acc + (item.price * item.qty), 0);
      const cartCount = cart.reduce((acc, item) => acc + item.qty, 0);

      return (
        <ShopContext.Provider value={{
          products,
          cart,
          wishlist,
          isCartOpen,
          setIsCartOpen,
          addToCart,
          removeFromCart,
          updateQty,
          toggleWishlist,
          cartTotal,
          cartCount,
          toast
        }}>
          {children}
        </ShopContext.Provider>
      );
    };

    const useShop = () => useContext(ShopContext);

    // Navbar Component
